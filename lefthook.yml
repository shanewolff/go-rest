pre-commit:
  parallel: true
  commands:
    go-fmt:
      glob: "*.go"
      run: go fmt ./...
    go-imports:
      glob: "*.go"
      run: goimports -w {staged_files}
    golangci-lint:
      glob: "*.go"
      run: golangci-lint run ./...
    go-test:
      glob: "*.go"
      run: go test -short ./...
    gosec:
      glob: "*.go"
      run: gosec -quiet ./...
    check-coverage:
      run: ./scripts/calculate_coverage.sh -short
    check-large-files:
      run: |
        for file in {staged_files}; do
          size=$(stat -f%z "$file" 2>/dev/null || stat -c%s "$file" 2>/dev/null)
          if [ "$size" -gt 1048576 ]; then
            echo "Error: File $file is larger than 1MB."
            exit 1
          fi
        done

commit-msg:
  commands:
    lint-commit-msg:
      run: |
        msg=$(head -n 1 {1})
        if ! echo "$msg" | grep -Eq '^(feat|fix|docs|style|refactor|perf|test|chore|ci|build|revert)(\(.+\))?: .{1,50}'; then
          echo "Error: Commit message does not follow conventional commits."
          echo "Format: <type>(<scope>): <subject>"
          echo "Example: feat: add new feature"
          exit 1
        fi
