version: '3'

vars:
  BIN_DIR: bin
  BINARY: api
  MAIN_PATH: cmd/api/main.go
  POSTGRES_CONTAINER: my-postgres
  DB_PASSWORD: postgres
  DB_PORT: 5432

tasks:
  default:
    cmds:
      - task: help

  help:
    desc: Show available tasks
    cmds:
      - task --list

  run:
    desc: Run the API server for local development
    cmds:
      - go run {{.MAIN_PATH}}

  build:
    desc: Build the API binary
    cmds:
      - go build -o {{.BIN_DIR}}/{{.BINARY}} {{.MAIN_PATH}}
    generates:
      - "{{.BIN_DIR}}/{{.BINARY}}"

  test:
    desc: Run all unit tests
    cmds:
      - go test ./...

  test-v:
    desc: Run all unit tests with verbose output
    cmds:
      - go test -v ./...

  test:coverage:
    desc: Run tests and display statement coverage for each package (excluding mocks)
    cmds:
      - go test -cover $(go list ./... | grep -v /mocks)

  test:coverage-out:
    desc: Run tests, generate a coverage profile, and show function-level coverage (excluding mocks)
    cmds:
      - go test -coverprofile=coverage.out $(go list ./... | grep -v /mocks)
      - go tool cover -func=coverage.out

  test:coverage-html:
    desc: Run tests, generate a coverage profile, and open the HTML coverage report (excluding mocks)
    cmds:
      - go test -coverprofile=coverage.out $(go list ./... | grep -v /mocks)
      - go tool cover -html=coverage.out

  mock:
    desc: Regenerate mocks using mockery
    cmds:
      - mockery
    sources:
      - internal/domain/*.go
      - .mockery.yaml
    generates:
      - internal/mocks/*.go

  tidy:
    desc: Tidy go modules
    cmds:
      - go mod tidy

  db:start:
    desc: Start a PostgreSQL instance in Docker
    cmds:
      - docker run --name {{.POSTGRES_CONTAINER}} -e POSTGRES_PASSWORD={{.DB_PASSWORD}} -p {{.DB_PORT}}:5432 -d postgres
    status:
      - docker ps -f name={{.POSTGRES_CONTAINER}} | grep {{.POSTGRES_CONTAINER}}

  db:stop:
    desc: Stop and remove the PostgreSQL Docker container
    cmds:
      - docker stop {{.POSTGRES_CONTAINER}}
      - docker rm {{.POSTGRES_CONTAINER}}
    ignore_error: true

  clean:
    desc: Clean build artifacts and generated mocks
    cmds:
      - rm -rf {{.BIN_DIR}}
      - rm -rf internal/mocks/*
      - rm -f coverage.out
    ignore_error: true

  lint:
    desc: Run golangci-lint (requires installation)
    cmds:
      - golangci-lint run ./...

  migrate:create:
    desc: "Create a new database migration file (Usage: task migrate:create -- <name>)"
    cmds:
      - migrate create -ext sql -dir internal/adapters/db/migrations {{.CLI_ARGS}}

  migrate:up:
    desc: Run all pending database migrations
    cmds:
      - . .env && migrate -path internal/adapters/db/migrations -database "$DB_URL" up

  migrate:down:
    desc: Revert the last database migration
    cmds:
      - . .env && migrate -path internal/adapters/db/migrations -database "$DB_URL" down 1

  hooks:setup:
    desc: Install Lefthook, gosec, goimports, and set up Git hooks
    cmds:
      - go install github.com/evilmartians/lefthook@latest
      - go install github.com/securego/gosec/v2/cmd/gosec@latest
      - go install golang.org/x/tools/cmd/goimports@latest
      - $(go env GOPATH)/bin/lefthook install
