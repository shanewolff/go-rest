version: '3.8'

services:
  db:
    image: postgres:latest
    container_name: go-rest-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      target: final
    container_name: go-rest-api
    depends_on:
      - db
    environment:
      - DB_DSN=host=db user=postgres password=postgres dbname=postgres port=5432 sslmode=disable TimeZone=UTC
      - API_TOKEN=secret123
      - SERVER_ADDR=:8080
      - LOG_LEVEL=debug
      - APP_ENV=development
    ports:
      - "8080:8080"

  api-debug:
    build:
      context: .
      target: debug
    container_name: go-rest-api-debug
    depends_on:
      - db
    security_opt:
      - "seccomp:unconfined"
    cap_add:
      - SYS_PTRACE
    environment:
      - DB_DSN=host=db user=postgres password=postgres dbname=postgres port=5432 sslmode=disable TimeZone=UTC
      - API_TOKEN=secret123
      - SERVER_ADDR=:8080
      - LOG_LEVEL=debug
      - APP_ENV=development
    ports:
      - "8080:8080"
      - "40000:40000"

volumes:
  postgres_data:
